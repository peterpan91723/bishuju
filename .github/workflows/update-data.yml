name: Update Rankings Data

on:
  schedule:
    # 每小时更新全部数据
    - cron: '7 * * * *'
  workflow_dispatch: # 手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pysocks

      - name: Setup Xray proxy
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          # 下载 Xray-core
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray
          chmod +x xray/xray

          # 解析 VLESS URL，生成 Xray 配置
          python3 - << 'PYEOF'
          import re, json, urllib.parse, os

          url = os.environ['PROXY_URL']
          # 解析: vless://UUID@host:port?params#name
          m = re.match(r'vless://([^@]+)@([^:]+):(\d+)\?([^#]+)', url)
          uuid = m.group(1)
          host = m.group(2)
          port = int(m.group(3))
          params = dict(urllib.parse.parse_qsl(m.group(4)))

          alpn_raw = urllib.parse.unquote(params.get('alpn', 'h2,http/1.1'))
          alpn_list = alpn_raw.split(',')
          ws_path = urllib.parse.unquote(params.get('path', '/'))
          ws_host = params.get('host', host)
          sni = params.get('sni', host)
          fp = params.get('fp', 'chrome')
          security = params.get('security', 'tls')
          net_type = params.get('type', 'ws')

          config = {
            "log": {"loglevel": "warning"},
            "inbounds": [{
              "port": 10808,
              "protocol": "socks",
              "settings": {"auth": "noauth", "udp": True}
            }],
            "outbounds": [{
              "protocol": "vless",
              "settings": {
                "vnext": [{
                  "address": host,
                  "port": port,
                  "users": [{"id": uuid, "encryption": "none"}]
                }]
              },
              "streamSettings": {
                "network": net_type,
                "security": security,
                "tlsSettings": {
                  "serverName": sni,
                  "alpn": alpn_list,
                  "fingerprint": fp
                },
                "wsSettings": {
                  "path": ws_path,
                  "headers": {"Host": ws_host}
                }
              }
            }]
          }

          with open('xray_config.json', 'w') as f:
              json.dump(config, f, indent=2)
          print('Xray 配置生成完毕')
          PYEOF

          # 启动 Xray（后台运行）
          ./xray/xray run -config xray_config.json > xray.log 2>&1 &
          sleep 3
          echo "Xray 已启动，本地 socks5://127.0.0.1:10808"

      - name: Run fetch_data.py (single run)
        env:
          ALL_PROXY: socks5://127.0.0.1:10808
          HTTPS_PROXY: socks5://127.0.0.1:10808
        run: |
          python -c "
          from fetch_data import *
          import json

          print('获取合约列表...')
          symbols = get_usdt_perpetual_symbols()
          print(f'{len(symbols)} 个合约')

          yesterday_data, funding_data, momentum_data, rsi70_data = fetch_daily_data(symbols)
          rsi_data = fetch_weekly_data(symbols)
          monthly_rsi_data = fetch_monthly_data(symbols)

          output = build_rankings(symbols, yesterday_data, funding_data, rsi_data, monthly_rsi_data, momentum_data, rsi70_data)
          save_data(output)
          print(f'数据已更新: {output[\"updateTime\"]}')
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rankings.json data/cache_weekly.json data/cache_monthly.json
          git diff --staged --quiet || git commit -m "自动更新数据 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
